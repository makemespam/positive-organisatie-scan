<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nieuwe scaninzending</title>
  </head>
  <body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="680" cellpadding="0" cellspacing="0" style="max-width:680px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;">
            <tr>
              <td style="background:#0f172a;padding:24px;">
                <h1 style="margin:0;font-size:22px;line-height:1.3;color:#ffffff;">Nieuwe Positieve Organisatie Scan</h1>
                <p style="margin:8px 0 0 0;font-size:14px;line-height:1.6;color:#cbd5e1;">Er is een nieuwe scan ingestuurd.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                  <tr>
                    <td style="padding:10px 12px;border:1px solid #e2e8f0;background:#f8fafc;font-size:13px;color:#475569;width:180px;">Deelnemer</td>
                    <td style="padding:10px 12px;border:1px solid #e2e8f0;font-size:14px;">{{participant_name}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 12px;border:1px solid #e2e8f0;background:#f8fafc;font-size:13px;color:#475569;">E-mail deelnemer</td>
                    <td style="padding:10px 12px;border:1px solid #e2e8f0;font-size:14px;">{{participant_email}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 12px;border:1px solid #e2e8f0;background:#f8fafc;font-size:13px;color:#475569;">Sterkste kwadrant</td>
                    <td style="padding:10px 12px;border:1px solid #e2e8f0;font-size:14px;"><strong>{{strongest_quadrant}}</strong></td>
                  </tr>
                </table>

                <h2 style="margin:20px 0 8px 0;font-size:17px;">Scores per kwadrant</h2>
                <pre style="margin:0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;font-size:13px;line-height:1.6;color:#0f172a;white-space:pre-wrap;">{{quadrant_scores}}</pre>

                <h2 style="margin:20px 0 8px 0;font-size:17px;">Volledige antwoorden</h2>
                <pre style="margin:0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;font-size:13px;line-height:1.6;color:#0f172a;white-space:pre-wrap;">{{answers}}</pre>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 24px;background:#f8fafc;border-top:1px solid #e2e8f0;">
                <p style="margin:0;font-size:12px;color:#64748b;">
                  Ontvanger: {{admin_email}}
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
